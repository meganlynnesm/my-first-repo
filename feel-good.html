<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>THe Feel-Good Transmitter</title>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Alfa+Slab+One&family=VT323&family=Doto:wght@400;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">

</head>
<body>
    <header>
        <div class="blast-bubble">
            <div class="kicker">Free Signal &middot; No Static</div>
            <div class="masthead">FEEL GOOD<span class="masthead-sub">transmitter</span></div>

    </header>

    <main>
        <div class="section-title">Random Signal Generator</div>
        <p>Six frequencies are tuned in below. Press the dial and get beamed to whichever one lights up.</p>
        <button id="randomButton">Take Me Somewhere Nice</button>
        <div id="statusDisplay"></div>
    </main>

    <script src="feel-good.js"></script>
</body>
